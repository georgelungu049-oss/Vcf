services:
  - type: web
    name: paxton-connect
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 3000
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
