<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin | PAXTON Connect V5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', system-ui, sans-serif; }
        body { background: #000; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #0a0a0a; border-radius: 20px; border: 1px solid #00ff00; margin-bottom: 30px; }
        h1 { color: #00ff00; }
        .login-card { max-width: 400px; margin: 100px auto; background: #0a0a0a; padding: 30px; border-radius: 20px; border: 1px solid #00ff00; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; }
        .login-card button { width: 100%; padding: 12px; background: #00aa00; border: none; border-radius: 25px; color: black; font-weight: 600; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0a0a0a; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #00aa00; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #00ff00; }
        .stat-label { color: #888; font-size: 0.7rem; }
        .card { background: #0a0a0a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #00aa00; }
        .card h3 { color: #00ff00; margin-bottom: 15px; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .setting-group { display: flex; flex-direction: column; gap: 5px; }
        .setting-group label { color: #888; font-size: 0.8rem; }
        .setting-group input { padding: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; }
        .btn { background: #00aa00; color: black; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .table-container { overflow-x: auto; background: #0a0a0a; border-radius: 20px; padding: 20px; border: 1px solid #00aa00; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        th { color: #00ff00; }
        .delete-btn { background: #ff3b30; color: white; border: none; padding: 4px 10px; border-radius: 15px; cursor: pointer; }
        .download-btn { background: #00aa00; color: black; border: none; padding: 4px 10px; border-radius: 15px; cursor: pointer; margin-right: 5px; }
        .alert { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; display: none; z-index: 1000; }
        .alert.success { background: #00aa00; color: black; }
        .alert.error { background: #ff3b30; color: white; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-admin { background: #ff3b30; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div id="adminContent" style="display: none;">
        <div class="container">
            <div class="header">
                <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
                <div class="logout-admin" onclick="adminLogout()">Logout</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalMembers">0</div><div class="stat-label">Members</div></div>
                <div class="stat-card"><div class="stat-number" id="activeMembers">0</div><div class="stat-label">Active</div></div>
                <div class="stat-card"><div class="stat-number" id="expiredMembers">0</div><div class="stat-label">Expired</div></div>
                <div class="stat-card"><div class="stat-number" id="totalDownloads">0</div><div class="stat-label">Downloads</div></div>
                <div class="stat-card"><div class="stat-number" id="zipReleases">0</div><div class="stat-label">ZIP Releases</div></div>
            </div>

            <div class="card">
                <h3>⚙️ Settings</h3>
                <div class="settings-grid">
                    <div class="setting-group"><label>ZIP Target (contacts)</label><input type="number" id="zipTarget" placeholder="500"></div>
                    <div class="setting-group"><label>ZIP Name Prefix</label><input type="text" id="zipName"></div>
                    <div class="setting-group"><label>VCF Duration (days)</label><input type="number" id="defaultDuration"></div>
                    <div class="setting-group"><label>WhatsApp Group Link</label><input type="text" id="whatsappLink"></div>
                    <div class="setting-group"><label>WhatsApp Channel Link</label><input type="text" id="channelLink"></div>
                </div>
                <button class="btn" onclick="saveSettings()">Save Settings</button>
                <button class="btn" onclick="downloadLiveZip()" style="margin-left: 10px;">Download Live ZIP</button>
            </div>

            <div class="card">
                <h3>🐺 Add Wolf Quote</h3>
                <textarea id="newQuote" rows="2" style="width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff;"></textarea>
                <button class="btn" onclick="addQuote()">Add Quote</button>
            </div>

            <div class="card">
                <h3>🔑 Change Admin Password</h3>
                <input type="password" id="newPassword" placeholder="New password" style="width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff;">
                <button class="btn" onclick="changePassword()">Change Password</button>
            </div>

            <div class="table-container">
                <h3 style="margin-bottom: 15px;">Pack Members</h3>
                <table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Created</th><th>Expires</th><th>Downloads</th><th>Actions</th></tr></thead><tbody id="membersTable"><tr><td colspan="7">Loading...</td></tr></tbody></table>
            </div>
        </div>
    </div>

    <div id="loginContainer" class="login-card">
        <h2>🐺 Admin Login</h2>
        <input type="text" id="adminUsername" placeholder="Username" value="admin">
        <input type="password" id="adminPassword" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
    </div>

    <div id="alert" class="alert"></div>

    <script>
        async function checkAdminSession() {
            const res = await fetch('/api/admin/check');
            const data = await res.json();
            if (data.isAdmin) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadStats();
                loadMembers();
            } else {
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('adminContent').style.display = 'none';
            }
        }

        async function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) {
                checkAdminSession();
            } else {
                alert('Invalid credentials');
            }
        }

        async function adminLogout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            checkAdminSession();
        }

        async function loadStats() {
            const res = await fetch('/api/admin/settings');
            const data = await res.json();
            const usersRes = await fetch('/api/admin/users');
            const users = await usersRes.json();
            const now = new Date();
            const active = users.filter(u => new Date(u.expires_at) > now).length;
            document.getElementById('totalMembers').textContent = users.length;
            document.getElementById('activeMembers').textContent = active;
            document.getElementById('expiredMembers').textContent = users.length - active;
            document.getElementById('totalDownloads').textContent = users.reduce((s,u) => s + (u.download_count||0), 0);
            document.getElementById('zipReleases').textContent = data.stats?.total_zip_releases || 0;
            document.getElementById('zipTarget').value = data.zip_target || 500;
            document.getElementById('zipName').value = data.zip_name || 'wolf-pack-contacts';
            document.getElementById('defaultDuration').value = data.default_duration || 30;
            document.getElementById('whatsappLink').value = data.whatsapp_group_link || '';
            document.getElementById('channelLink').value = data.whatsapp_channel_link || '';
        }

        async function loadMembers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const tbody = document.getElementById('membersTable');
            if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="7">No members</td></tr>'; return; }
            tbody.innerHTML = users.map(u => `<tr><td>${u.id}</td><td>🐺 ${u.name}</td><td>${u.phone}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td>${new Date(u.expires_at).toLocaleDateString()}</td><td>${u.download_count||0}</td><td><button class="download-btn" onclick="downloadVCF(${u.id})">VCF</button><button class="delete-btn" onclick="deleteUser(${u.id})">Del</button></td></tr>`).join('');
        }

        async function saveSettings() {
            const settings = {
                zip_target: parseInt(document.getElementById('zipTarget').value),
                zip_name: document.getElementById('zipName').value,
                default_duration: parseInt(document.getElementById('defaultDuration').value),
                whatsapp_group_link: document.getElementById('whatsappLink').value,
                whatsapp_channel_link: document.getElementById('channelLink').value
            };
            await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settings) });
            showAlert('Settings saved', 'success');
        }

        function downloadLiveZip() { window.open('/api/admin/download-all', '_blank'); showAlert('ZIP download started', 'success'); }
        function downloadVCF(id) { window.open(`/api/admin/download/${id}`, '_blank'); showAlert('Download started', 'success'); }
        async function addQuote() { const quote = document.getElementById('newQuote').value; if (quote) { await fetch('/api/admin/wolf-quote', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ quote }) }); document.getElementById('newQuote').value = ''; showAlert('Quote added', 'success'); } }
        async function changePassword() { const password = document.getElementById('newPassword').value; if (password) { await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ admin_password: password }) }); showAlert('Password changed', 'success'); document.getElementById('newPassword').value = ''; } }
        async function deleteUser(id) { if (confirm('Delete this member?')) { await fetch(`/api/admin/user/${id}`, { method: 'DELETE' }); loadStats(); loadMembers(); showAlert('Member deleted', 'success'); } }
        function showAlert(msg, type) { const alert = document.getElementById('alert'); alert.textContent = msg; alert.className = `alert ${type}`; alert.style.display = 'block'; setTimeout(() => alert.style.display = 'none', 3000); }
        checkAdminSession();
    </script>
</body>
</html>
